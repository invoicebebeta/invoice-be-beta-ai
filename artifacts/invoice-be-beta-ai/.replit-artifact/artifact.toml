kind = "mobile"
previewPath = "/"
title = "Invoice Be Beta AI"
version = "1.0.0"
id = "artifacts/invoice-be-beta-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24342

[services.development]
run = "pnpm --filter @workspace/invoice-be-beta-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invoice-be-beta-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/invoice-be-beta-ai", "run", "serve" ]

[services.env]
PORT = "24342"
BASE_PATH = "/"
